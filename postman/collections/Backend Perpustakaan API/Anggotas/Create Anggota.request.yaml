    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "nim": "1234567890",
      "nama": "Mahasiswa Perpustakaan",
      "prodi": "Teknik Informatika",
      "email": "mahasiswa@example.com"
    }
