$kind: http-request
name: 'Update Anggota'
method: PUT
url: '{{base_url}}/anggotas/:anggota_id'
order: 5400
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: anggota_id
    value: '{{anggota_id}}'
body:
  type: json
  content: |-
    {
      "nim": "1234567890",
      "nama": "Mahasiswa Perpustakaan Updated",
      "prodi": "Teknik Informatika",
      "email": "mahasiswa.updated@example.com"
    }
