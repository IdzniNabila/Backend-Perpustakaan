$kind: http-request
name: 'Update Peminjaman'
method: PUT
url: '{{base_url}}/peminjamans/:peminjaman_id'
order: 6400
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: peminjaman_id
    value: '{{peminjaman_id}}'
body:
  type: json
  content: |-
    {
      "status": "Selesai"
    }
