$kind: collection
name: 'Backend Perpustakaan API'
description: |-
  Collection generated from the Laravel API implementation in routes/api.php and app/Http/Controllers.

  Public endpoint:
  - POST /login

  Protected endpoints require Laravel Sanctum Bearer token authentication:
  - POST /logout
  - Full CRUD API resources for users, kategoris, bukus, anggotas, peminjamans, and detail-peminjamans.
variables:
  - key: base_url
    value: 'http://127.0.0.1:8000/api'
    description: 'Laravel API base URL'
  - key: access_token
    value: ''
    description: 'Bearer token returned by POST /login'
  - key: user_id
    value: '1'
  - key: kategori_id
    value: '1'
  - key: buku_id
    value: '1'
  - key: anggota_id
    value: '1'
  - key: peminjaman_id
    value: '1'
  - key: detail_peminjaman_id
    value: '1'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{access_token}}'
